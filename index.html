<!DOCTYPE html>
<html>

<head>
<title>For Roaa ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    text-align: center;
    overflow: hidden;
}

/* القلوب */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* الصندوق */
.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    margin: 100px auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

/* النص */
h1 {
    color: #ff4d6d;
}

p {
    color: #555;
    font-size: 18px;
}

/* زر */
button {
    background-color: #ff4d6d;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #e6004c;
}
</style>

</head>

<body>

<div class="box">

<h1>For My Roody ❤️</h1>

<p>
سأختارك دائمًا حتى في الأيام التي لا نفهم فيها بعضنا  
أنتِ الشخص الذي أريد أن أحبه للنهاية 💕
</p>

<p>
I will always choose you, even on the days we don't understand each other.  
You are the one I want to love forever ❤️
</p>

<button onclick="showLove()">إضغطي هنا يا روحي ❤️</button>

</div>

<script>
function showLove() {
    document.body.innerHTML = `
    <div class="box">
        <h1>I love you Roaa ❤️</h1>
        <p>إنتِ كل حياتي وما بقدر أستغنى عنك 💕</p>
    </div>
    `;
}

/* قلوب متحركة */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}, 500);
</script>

</body>
</html>
